services:
  postgres: 
    image: postgres:16

    container_name: retail_postgres_16

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  ingestion:
    image: ecommerce-ingestion:latest
    build:
      context: .

    container_name: ingestion_service

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
